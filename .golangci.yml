version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gocyclo
    - revive

  settings:
    gocyclo:
      # Flag functions with cyclomatic complexity > 7.
      # min-complexity is the lowest value that gets reported, so 8 enforces ≤ 7.
      min-complexity: 8

    revive:
      rules:
        - name: exported
          severity: warning

  exclusions:
    rules:
      # fmt.Fprint* on io.Writer in reporter code — errors surface on the next
      # write and are returned by the Write method; inline checking is noise.
      - linters: [errcheck]
        path: "internal/adapters/reporter/"
        text: "Error return value of `fmt\\.Fprint"

      # Test files: relax errcheck and complexity — test helpers often chain
      # calls and assertions without explicit error propagation.
      - linters: [errcheck, gocyclo]
        path: "_test\\.go"

      # Testdata fixtures are intentionally bad code that exercises the metrics.
      - linters: [errcheck, gocyclo, revive, staticcheck, govet]
        path: "testdata/"

formatters:
  enable:
    - goimports
