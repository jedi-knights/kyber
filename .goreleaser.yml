version: 2

project_name: kyber

before:
  hooks:
    - go mod download
    - go mod verify

builds:
  - id: kyber
    main: ./cmd/kyber
    binary: kyber
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: kyber
    ids: [kyber]
    # kyber_0.1.0_linux_amd64.tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - kyber.toml.example

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Changelog is managed by go-semantic-release (CHANGELOG.md).
# GoReleaser's built-in changelog is disabled to avoid duplication.
changelog:
  disable: true

release:
  github:
    owner: jedi-knights
    name: kyber
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
